version: "3.9"

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - CORS_ORIGINS=["http://localhost","http://frontend"]
    volumes:
      - uploads_data:/app/uploads
      - ./backend/weights:/app/weights:ro
      - ./ct_seg.db:/app/ct_seg.db

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=1
    restart: unless-stopped
    depends_on:
      - redis
      - backend
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    volumes:
      - uploads_data:/app/uploads
      - ./backend/weights:/app/weights:ro
      - ./ct_seg.db:/app/ct_seg.db

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  redis_data:
  uploads_data:
